<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<title>Alltagsengel — Instagram Feed Ad</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; background: #0D0A08; font-family: 'Inter', sans-serif; overflow: hidden; position: relative; }

.bg-glow {
  position: absolute; width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,150,60,0.15), transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}

.content { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; }

.top-badge { background: rgba(201,150,60,0.12); border: 1px solid rgba(201,150,60,0.25); padding: 10px 24px; border-radius: 30px; color: #C9963C; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; font-weight: 600; }

.logo { font-size: 120px; margin-bottom: 20px; }

h1 { font-family: 'Playfair Display', serif; color: #C9963C; font-size: 64px; letter-spacing: 6px; margin-bottom: 10px; }
.tagline { color: rgba(255,255,255,0.4); font-size: 20px; font-style: italic; margin-bottom: 50px; }

.features-row { display: flex; gap: 20px; margin-bottom: 50px; }
.feat-card {
  background: rgba(201,150,60,0.06); border: 1px solid rgba(201,150,60,0.15);
  border-radius: 20px; padding: 24px 28px; text-align: center; width: 200px;
}
.feat-card .icon { font-size: 40px; margin-bottom: 10px; }
.feat-card .title { color: #e8e0d4; font-size: 15px; font-weight: 600; }
.feat-card .sub { color: rgba(255,255,255,0.35); font-size: 12px; margin-top: 4px; }

.cta { background: linear-gradient(135deg, #C9963C, #DBA84A); color: #0D0A08; padding: 20px 60px; border-radius: 16px; font-weight: 700; font-size: 20px; letter-spacing: 3px; margin-bottom: 16px; }
.url { color: rgba(255,255,255,0.3); font-size: 16px; letter-spacing: 1px; }

.corner-badge { position: absolute; top: 40px; right: 40px; background: rgba(80,200,120,0.15); border: 1px solid rgba(80,200,120,0.3); padding: 8px 16px; border-radius: 10px; color: #50C878; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="corner-badge">§45b abrechenbar</div>
<div class="content">
  <div class="top-badge">Premium Alltagsbegleitung</div>
  <div class="logo">👼</div>
  <h1>ALLTAGSENGEL</h1>
  <div class="tagline">Mit Herz für dich da</div>
  <div class="features-row">
    <div class="feat-card"><div class="icon">🏥</div><div class="title">Krankenfahrten</div><div class="sub">Sicher & zuverlässig</div></div>
    <div class="feat-card"><div class="icon">🛒</div><div class="title">Einkaufshilfe</div><div class="sub">Gemeinsam einkaufen</div></div>
    <div class="feat-card"><div class="icon">📋</div><div class="title">Behördengänge</div><div class="sub">Wir begleiten dich</div></div>
    <div class="feat-card"><div class="icon">💛</div><div class="title">Gesellschaft</div><div class="sub">Zeit & Gespräche</div></div>
  </div>
  <div class="cta">JETZT KOSTENLOS STARTEN</div>
  <div class="url">alltagsengel.care</div>
</div>
</body>
</html>
