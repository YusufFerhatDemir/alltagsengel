<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="1000" height="1000" fill="#000000"/>

  <defs>
    <!-- Main gold gradient matching Alltagsengel logo -->
    <linearGradient id="mainGold" x1="300" y1="150" x2="700" y2="750" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="25%" stop-color="#D4A840"/>
      <stop offset="50%" stop-color="#C9963C"/>
      <stop offset="75%" stop-color="#B8882E"/>
      <stop offset="100%" stop-color="#A07428"/>
    </linearGradient>

    <!-- Lighter gold for highlights -->
    <linearGradient id="lightGold" x1="400" y1="200" x2="600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8E878"/>
      <stop offset="50%" stop-color="#E8C850"/>
      <stop offset="100%" stop-color="#C9963C"/>
    </linearGradient>

    <!-- Heart gradient -->
    <linearGradient id="heartGold" x1="420" y1="340" x2="580" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8E064"/>
      <stop offset="50%" stop-color="#DBA84A"/>
      <stop offset="100%" stop-color="#C9963C"/>
    </linearGradient>

    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Person figure - centered, matching Alltagsengel style -->

  <!-- Head -->
  <circle cx="500" cy="260" r="85" fill="url(#lightGold)" filter="url(#glow)"/>

  <!-- Body / Torso -->
  <path d="M500 345
           C440 345, 360 380, 340 440
           L310 560
           C305 575, 310 585, 325 585
           L400 585
           L400 720
           C400 740, 415 750, 430 750
           L570 750
           C585 750, 600 740, 600 720
           L600 585
           L675 585
           C690 585, 695 575, 690 560
           L660 440
           C640 380, 560 345, 500 345Z"
        fill="url(#mainGold)" filter="url(#glow)"/>

  <!-- Left hand reaching out -->
  <path d="M340 440
           C310 420, 250 400, 220 420
           C200 432, 195 450, 210 465
           L280 500
           L310 560"
        fill="url(#mainGold)"/>

  <!-- Right hand reaching out -->
  <path d="M660 440
           C690 420, 750 400, 780 420
           C800 432, 805 450, 790 465
           L720 500
           L690 560"
        fill="url(#mainGold)"/>

  <!-- Heart above the person (centered) -->
  <path d="M500 140
           C500 140, 455 95, 430 95
           C400 95, 378 118, 378 148
           C378 195, 420 230, 500 275
           C580 230, 622 195, 622 148
           C622 118, 600 95, 570 95
           C545 95, 500 140, 500 140Z"
        fill="url(#heartGold)" filter="url(#glow)"/>
</svg>