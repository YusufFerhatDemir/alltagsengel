<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>CHAIRMATCH – Vermietung & Services</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#050407;
      --bg-soft:#0b090f;
      --card:#14121b;
      --card-soft:#1b1824;
      --border:#252032;
      --gold1:#f3e3a5;
      --gold2:#e8d06a;
      --gold3:#c8a84b;
      --stone:#a39aa8;
      --muted:#6c6378;
      --danger:#ff5c7a;
      --radius-lg:18px;
      --radius-md:14px;
      --shadow-soft:0 18px 45px rgba(0,0,0,.7);
      --shadow-strong:0 24px 70px rgba(0,0,0,.85)
    }
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
      background:radial-gradient(circle at top,#151021 0,#050407 55%,#020104 100%);
      color:#f9f5ff;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility
    }
    #app{
      min-height:100vh;
      max-width:960px;
      margin:0 auto;
      padding:18px 14px 32px;
      display:flex;
      flex-direction:column;
      gap:16px
    }

    /* Logo Animation */
    @keyframes logoFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-4px)}}
    @keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 10px rgba(200,168,75,0.5)) drop-shadow(0 0 25px rgba(200,168,75,0.15))}50%{filter:drop-shadow(0 0 20px rgba(232,208,106,0.8)) drop-shadow(0 0 40px rgba(200,168,75,0.3))}}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:999px;
      background:rgba(9,6,15,.92);
      border:1px solid rgba(120,102,166,.55);
      box-shadow:0 14px 40px rgba(0,0,0,.85)
    }
    .chip{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(120,102,166,.45);
      background:radial-gradient(circle at top left,rgba(232,208,106,.18),rgba(20,16,30,.9));
      color:var(--gold1);
      font-size:11px;
      display:flex;
      align-items:center;
      gap:6px;
      white-space:nowrap
    }
    .chip span.badge{
      font-size:9px;
      padding:2px 7px;
      border-radius:999px;
      border:1px solid rgba(249,241,214,.6);
      background:rgba(12,9,18,.9)
    }

    .hero{
      margin-top:4px;
      padding:14px 14px 18px;
      border-radius:var(--radius-lg);
      background:radial-gradient(circle at top,#1c132f 0,#0a0811 48%,#050307 100%);
      border:1px solid rgba(130,112,190,.45);
      box-shadow:var(--shadow-soft);
      display:flex;
      flex-direction:column;
      gap:10px
    }
    .hero h1{
      font-size:20px;
      letter-spacing:.17em;
      text-transform:uppercase;
      color:var(--gold2)
    }
    .hero p{
      font-size:13px;
      color:var(--stone);
      max-width:520px
    }

    .section-title{
      margin-top:18px;
      margin-bottom:8px;
      font-size:13px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--muted)
    }

    .catgrid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:10px
    }
    .catcard{
      position:relative;
      padding:12px 10px 12px;
      border-radius:16px;
      background:radial-gradient(circle at top,rgba(126,110,190,.25),rgba(8,5,16,.98));
      border:1px solid rgba(132,115,195,.55);
      box-shadow:0 16px 40px rgba(0,0,0,.9);
      display:flex;
      flex-direction:column;
      align-items:stretch
    }

    /* Icon Container – V2 PNG Setup */
    .catcard .caticon{width:100%;height:140px;border-radius:16px;background:transparent;display:flex;align-items:center;justify-content:center}
    .catcard .caticon img{width:100%;height:100%;object-fit:contain;object-position:center;filter:drop-shadow(0 0 12px rgba(200,168,75,0.5)) drop-shadow(0 0 30px rgba(200,168,75,0.15));border-radius:12px}

    .catcard .catlbl{
      margin-top:10px;
      font-size:12px;
      font-weight:600;
      letter-spacing:.09em;
      text-transform:uppercase;
      color:var(--gold1)
    }
    .catcard .catsub{
      margin-top:4px;
      font-size:10px;
      color:var(--stone)
    }

    .rental-row{
      margin-top:16px;
      padding:10px 11px;
      border-radius:14px;
      background:radial-gradient(circle at top left,rgba(234,210,120,.14),rgba(6,4,10,.96));
      border:1px solid rgba(139,120,196,.45);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px
    }
    .rental-row span.label{
      font-size:11px;
      color:var(--stone)
    }
    .rental-types{
      display:flex;
      align-items:center;
      gap:8px
    }
    .rental-pill{
      padding:4px 7px 4px 5px;
      border-radius:999px;
      border:1px solid rgba(150,132,210,.55);
      background:rgba(9,6,15,.96);
      display:flex;
      align-items:center;
      gap:5px;
      font-size:10px;
      color:var(--gold1)
    }

    .onboarding{
      margin-top:18px;
      padding:16px 12px 18px;
      border-radius:var(--radius-lg);
      background:radial-gradient(circle at top,rgba(236,215,133,.12),rgba(7,5,10,.98));
      border:1px solid rgba(160,138,210,.5);
      box-shadow:var(--shadow-strong);
      text-align:center
    }
    .onboarding h2{
      font-size:15px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--gold2)
    }
    .onboarding p{
      margin-top:6px;
      font-size:11px;
      color:var(--stone)
    }

    @media(max-width:599px){
      #app{padding:14px 10px 26px}
      .hero{padding:12px 11px 14px}
      .hero h1{font-size:17px}
      .hero p{font-size:12px}
      .catgrid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    /* Extra small screens – icons respond */
    @media(max-width:374px){.catcard{padding:10px 6px 10px;border-radius:13px}.catcard .caticon{height:100px}.catcard .catlbl{font-size:11px;margin-top:7px}.catcard .catsub{font-size:8px}}
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    function logoHeader(small){
      if(small) return `<div style="display:flex;align-items:center;gap:10px;min-width:0;flex-shrink:1">
        <div style="animation:logoFloat 3s ease-in-out infinite,logoGlow 3s ease-in-out infinite;display:inline-block;flex-shrink:0">
          <img src="icons/logo_symbol_512x512.png" width="36" height="36" style="object-fit:contain">
        </div>
        <div style="min-width:0">
          <p class="cinzel" style="font-size:15px;font-weight:700;letter-spacing:2px;color:var(--gold2);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">CHAIR<span style="color:var(--gold3)">MATCH</span></p>
          <p style="font-size:8px;letter-spacing:3px;color:var(--stone);margin-top:2px">DEUTSCHLAND</p>
        </div>
      </div>`;
      return `<div style="display:flex;flex-direction:column;align-items:center;padding:16px 0 10px">
        <div style="animation:logoFloat 3s ease-in-out infinite,logoGlow 3s ease-in-out infinite;display:inline-block">
          <img src="icons/logo_lockup_512x384.png" style="height:140px;object-fit:contain">
        </div>
      </div>`;
    }

    // Kategorie-Icons – V2 PNG
    const catIcons={
      barber:'<img src="icons/01_barbershop_256x384.png" alt="Barbershop">',
      friseur:'<img src="icons/02_friseur_256x384.png" alt="Friseur">',
      kosmetik:'<img src="icons/03_kosmetik_256x384.png" alt="Kosmetik">',
      aesthetik:'<img src="icons/04_aesthetik_256x384.png" alt="Ästhetik">',
      nail:'<img src="icons/05_nagelstudio_256x384.png" alt="Nagelstudio">',
      massage:'<img src="icons/06_massage_256x384.png" alt="Massage">',
      lash:'<img src="icons/07_lash_brows_256x384.png" alt="Lash &amp; Brows">',
      arzt:'<img src="icons/08_arzt_klinik_256x384.png" alt="Arzt / Klinik">',
      opraum:'<img src="icons/09_op_raum_512x384.png" alt="OP-Raum">',
      angebote:'<img src="icons/10_angebote_256x384.png" alt="Angebote">',
      termin:'<img src="icons/11_termin_256x384.png" alt="Termin">'
    };

    // Bestehende SVG-Fallbacks (nicht entfernt)
    function catSVG(){ return ""; }
    function dbSeat(){ return ""; }

    function rentalIcon(type){
      const iconMap={stuhl:"icons/12_stuhlvermietung_512x384.png",liege:"icons/06_massage_256x384.png",raum:"icons/03_kosmetik_256x384.png",opraum:"icons/09_op_raum_512x384.png"};
      const src=iconMap[type];
      if(src) return `<img src="${src}" width="26" height="26" style="object-fit:contain;filter:drop-shadow(0 0 6px rgba(200,168,75,0.4));border-radius:4px" alt="${type}">`;
      return "";
    }

    function renderHome(){
      const categories=[
        {key:"barber",label:"Barbershop",sub:"Männerfrisuren, Bartpflege & Grooming"},
        {key:"friseur",label:"Friseur",sub:"Damen- & Herrenfriseur, Coloration, Styling"},
        {key:"kosmetik",label:"Kosmetikstudio",sub:"Facials, Hautpflege, Peelings"},
        {key:"aesthetik",label:"Ästhetik",sub:"Medical Beauty & Ästhetische Behandlungen"},
        {key:"nail",label:"Nagelstudio",sub:"Maniküre, Pediküre & Nail Art"},
        {key:"massage",label:"Massage & Spa",sub:"Entspannung, Wellness & Regeneration"},
        {key:"lash",label:"Lash & Brows",sub:"Wimpern, Augenbrauen & Brow Lifting"},
        {key:"arzt",label:"Arzt / Klinik",sub:"Praxen, MVZ & Kliniken"},
        {key:"opraum",label:"OP-Raum",sub:"Operationsräume und Eingriffsräume"},
        {key:"angebote",label:"Angebote",sub:"Einführungsangebote & Aktionen"},
        {key:"termin",label:"Terminservice",sub:"Digitale Terminbuchung & Verwaltung"}
      ];

      const app=document.getElementById("app");
      const catsHTML=categories.map(c=>`
        <article class="catcard">
          <div class="caticon">
            ${catIcons[c.key]||catSVG(c.key)}
          </div>
          <div>
            <p class="catlbl">${c.label}</p>
            <p class="catsub">${c.sub}</p>
          </div>
        </article>
      `).join("");

      const rentalTypes=["stuhl","liege","raum","opraum"];
      const rentalHTML=rentalTypes.map(t=>`
        <div class="rental-pill">
          ${rentalIcon(t)}
          <span>${t==="stuhl"?"Stuhl":t==="liege"?"Behandlungsliege":t==="raum"?"Raum":t==="opraum"?"OP-Raum":t}</span>
        </div>
      `).join("");

      const onboardingSlides=[{icon:"chair",title:"Stuhlvermietung für Profis",body:"Vermiete deinen Behandlungsplatz tage- oder monatsweise – komplett digital verwaltet."}];
      const sl=onboardingSlides[0];

      const onboardingIcon = sl.icon==="chair"
        ? `<div style="margin-bottom:14px;display:flex;align-items:center;justify-content:center;animation:logoFloat 3s ease-in-out infinite,logoGlow 3s ease-in-out infinite"><img src="icons/12_stuhlvermietung_512x384.png" style="height:140px;object-fit:contain" alt="Stuhlvermietung"></div>`
        : "";

      app.innerHTML=`
        <header class="topbar">
          ${logoHeader(true)}
          <div class="chip">
            <span>Vermietung von Stuhl, Liege & Raum</span>
            <span class="badge">V2 ICONS</span>
          </div>
        </header>

        <section class="hero">
          ${logoHeader(false)}
          <h1>Premium Flächen für Beauty & Health</h1>
          <p>CHAIRMATCH verbindet Studios, Praxen und Kliniken mit selbstständigen Profis – mit tageweiser Stuhl-, Liegen- und Raumvermietung in ganz Deutschland.</p>
        </section>

        <h2 class="section-title">Kategorien</h2>
        <section class="catgrid">
          ${catsHTML}
        </section>

        <section class="rental-row">
          <span class="label">Was möchtest du vermieten?</span>
          <div class="rental-types">
            ${rentalHTML}
          </div>
        </section>

        <section class="onboarding">
          ${onboardingIcon}
          <h2>${sl.title}</h2>
          <p>${sl.body}</p>
        </section>
      `;
    }

    renderHome();
  </script>
</body>
</html>
